name: CI Pipeline

on:
pull_request:
branches:
- main

jobs:
build-test-docker:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Install Dependencies
    run: npm install

  - name: Run Tests
    run: npm test

  - name: Build App
    run: npm run build

  - name: Build Docker Image
    run: docker build -t myapp:test .
```
